{% extends 'base.html' %}
{% load static %}

{% block head_title %}Login - E-commerce{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header text-center">
                    <h3>Fazer Login</h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}   <!-- Sempre gera token fresco -->
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100 mt-3">
                            Entrar
                        </button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <a href="{% url 'register' %}">Não tem conta? Cadastre-se</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
