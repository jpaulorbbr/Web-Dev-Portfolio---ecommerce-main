{% extends 'custom-admin/admin-base.html' %}

<h1>Test Admin Register</h1>

{% block bodyblock %}

<br>

{% if form.errors %}

<div class="alert alert-warning alert-dismissible fade show" role="alert">
                <strong>There was an error with your form...</strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>


{% endif %}

{% if form.errors %}

<div class="errors">
    {{ form.errors }}
</div>

{% endif %}

<div class="row">
<div class="col-xs-12 col-sm-12 shadow p-4 mb-5 bg-body rounded admin-register-form" >
    <h1>Admin Register</h1>

    <form method="post" action="{% url 'admin_register' %}" enctype="multipart/form-data">
        {% csrf_token %}
        
        {{ form.as_p }}
        <!--
        {% for field in form %}
            <div class="col-xs-12 col-sm-6 mx-auto">
                {{ field.label_tag }}
                {{ field }}
                {{ field.help_text }}
            </div>
        {% endfor %}
        -->
        <br>

        <input type="submit" value="Submit" class="btn btn-secondary">
    </form>
</div>
</div>


{% endblock %}
